 ...
];
let current = 0;
let userAnswers = new Array(questions.length).fill(null);
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Health I Practice Exam</title>

<style>
body{
 font-family:Arial,sans-serif;
 max-width:900px;
 margin:auto;
 padding:20px;
}
#timer{
 font-size:20px;
 color:darkred;
 margin-bottom:10px;
}
#progressBar{
 width:100%;
 background:#ddd;
 border-radius:5px;
}
#progress{
 height:20px;
 width:0%;
 background:#4CAF50;
 border-radius:5px;
}
.question{
 margin-top:20px;
}
button{
 padding:10px 20px;
 margin:10px;
}
#results{
 margin-top:20px;
 padding:15px;
 background:#f5f5f5;
}
@media(max-width:600px){
 body{
  padding:10px;
 }
 button{
  width:100%;
 }
}
</style>
</head>

<body>

<h1>Health I (30100B) Practice Exam</h1>

<div id="timer">30:00</div>
<div id="counter"></div>
<div id="progressBar">
<div id="progress"></div>
</div>

<div id="quiz"></div>

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitExam()">Submit Exam</button>

<div id="results"></div>

<script>

let questions = [

{
q:"Which nutrient is the body's primary source of energy?",
o:["Protein","Carbohydrates","Vitamins","Minerals"],
a:1,
e:"Carbohydrates are the body's preferred energy source."
},

{
q:"BMI stands for:",
o:["Body Mass Index","Body Muscle Indicator","Basic Metabolism Index","Body Measure Inventory"],
a:0,
e:"BMI uses height and weight."
},

{
q:"Which habit best prevents illness?",
o:["Sharing drinks","Handwashing","Skipping sleep","Ignoring symptoms"],
a:1,
e:"Handwashing reduces germ transmission."
},

{
q:"Which disease is communicable?",
o:["Diabetes","Influenza","Cancer","Asthma"],
a:1,
e:"Influenza spreads person to person."
},

{
q:"Nicotine is:",
o:["Vitamin","Mineral","Addictive stimulant","Protein"],
a:2,
e:"Nicotine is an addictive stimulant."
},

{
q:"Healthy relationships require:",
o:["Respect","Control","Threats","Manipulation"],
a:0,
e:"Respect is a key trait of healthy relationships."
},

{
q:"CPR stands for:",
o:["Cardiopulmonary Resuscitation","Cardiac Pulse Repair","Pulmonary Recovery","Cardiac Response"],
a:0,
e:"CPR is an emergency lifesaving technique."
},

{
q:"Vaccines help:",
o:["Prevent disease","Cause disease","Replace sleep","Increase stress"],
a:0,
e:"Vaccines help prevent infectious diseases."
},

{
q:"The FITT principle relates to:",
o:["Nutrition","Exercise","Medicine","Safety"],
a:1,
e:"FITT helps plan exercise."
},

{
q:"Best source of health information?",
o:["Rumors","Healthcare professionals","Ads","Anonymous posts"],
a:1,
e:"Healthcare professionals provide reliable information."
},

{
q:"Stress that motivates you is called:",
o:["Distress","Eustress","Anxiety","Depression"],
a:1,
e:"Eustress is positive stress."
},

{
q:"A pathogen is:",
o:["Vitamin","Disease-causing organism","Protein","Exercise plan"],
a:1,
e:"Pathogens can cause disease."
},

{
q:"Emergency phone number:",
o:["411","811","911","311"],
a:2,
e:"911 is for emergencies."
},

{
q:"Secondhand smoke is:",
o:["Harmless","Potentially harmful","Exercise","Vitamin source"],
a:1,
e:"Secondhand smoke can damage health."
},

{
q:"A healthy snack is:",
o:["Candy","Apple slices","Soda","Chips"],
a:1,
e:"Fruits are nutrient rich."
},

{
q:"Peer pressure is:",
o:["Disease","Influence from others","Exercise","Treatment"],
a:1,
e:"Peer pressure influences behavior."
},

{
q:"Abstinence means:",
o:["Healthy eating","Exercise","Refraining from sexual activity","Goal setting"],
a:2,
e:"Abstinence means not engaging in sexual activity."
},

{
q:"Exercise improves:",
o:["Mental health","Disease risk only","Stress levels negatively","None"],
a:0,
e:"Exercise helps physical and mental health."
},

{
q:"Good sleep supports:",
o:["Recovery and learning","Illness","Addiction","Stress"],
a:0,
e:"Sleep is essential to health."
},

{
q:"Alcohol impairs:",
o:["Judgment","Height","Eye color","Hair growth"],
a:0,
e:"Alcohol affects decision making."
},

{
q:"Flexibility is part of:",
o:["Fitness","Disease","Nutrition","Safety"],
a:0,
e:"Flexibility is a health-related fitness component."
},

{
q:"Goal setting should be:",
o:["Vague","Impossible","Specific","Random"],
a:2,
e:"Goals should be specific and achievable."
},

{
q:"Self-esteem means:",
o:["How you value yourself","BMI","Fitness","Disease prevention"],
a:0,
e:"Self-esteem is your sense of self-worth."
},

{
q:"Which helps reduce stress?",
o:["Smoking","Exercise","Skipping sleep","Isolation"],
a:1,
e:"Exercise is a healthy coping tool."
},

{
q:"Water helps:",
o:["Hydration","Smoking","Stress","Disease spread"],
a:0,
e:"Water is essential for body function."
}

];

questions.sort(()=>Math.random()-0.5);

let current=0;

function showQuestion(){

 let q = questions[current];

 document.getElementById("quiz").innerHTML = `
 <div class="question">
   <h3>${current+1}. ${q.q}</h3>

   ${q.o.map((option,index)=>`

      <label>
       <input
          type="radio"
          name="answer"
          value="${index}"
          ${userAnswers[current]===index ? "checked" : ""}
       >
       ${option}
      </label><br>

   `).join("")}

 </div>
 `;

 document.getElementById("progress").style.width =
 ((current+1)/questions.length*100) + "%";
 document.getElementById("counter").innerHTML =
"Question " +
(current+1) +
" of " +
questions.length;
}
function saveAnswer(){

 let selected =
 document.querySelector('input[name="answer"]:checked');

 if(selected){

   userAnswers[current] =
   parseInt(selected.value);

 }

}
function nextQuestion(){

 saveAnswer();

 if(current < questions.length-1){

   current++;

   showQuestion();

 }

}

function prevQuestion(){

 saveAnswer();

 if(current > 0){

   current--;

   showQuestion();

 }

}

let timeLeft=1800;

let timer=setInterval(()=>{

timeLeft--;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

document.getElementById("timer").innerHTML=
m+":"+(s<10?"0":"")+s;

if(timeLeft<=0){
clearInterval(timer);
submitExam();
}

},1000);

function submitExam(){

 saveAnswer();

 clearInterval(timer);

 let score = 0;

 let review = "";

 questions.forEach((q,index)=>{

   let studentAnswer =
   userAnswers[index];

   if(studentAnswer === q.a){

      score++;

   }
   else{

      review += `
      <div style="border:1px solid #ddd;
                  padding:10px;
                  margin:10px 0">

      <b>Question ${index+1}</b><br>

      ${q.q}<br><br>

      <b>Your Answer:</b>
      ${
        studentAnswer!=null
        ? q.o[studentAnswer]
        : "No Answer"
      }

      <br>

      <b>Correct Answer:</b>
      ${q.o[q.a]}

      <br>

      <b>Explanation:</b>
      ${q.e}

      </div>
      `;

   }

 });

 let percent =
 Math.round(
   (score/questions.length)*100
 );

 let rating="";

 if(percent>=90){

   rating =
   "🌟 Excellent - Very Ready for CBE";

 }
 else if(percent>=80){

   rating =
   "✅ Ready for CBE";

 }
 else if(percent>=70){

   rating =
   "⚠️ Review Needed";

 }
 else{

   rating =
   "📚 More Study Needed";

 }

 document.getElementById("results").innerHTML = `

 <h2>Final Score:
 ${score}/${questions.length}
 </h2>

 <h2>${percent}%</h2>

 <h3>${rating}</h3>

 <button onclick="window.print()">
 Print Results
 </button>

 <hr>

 <h2>Questions Missed</h2>

 ${review}

 `;

 window.scrollTo(0,document.body.scrollHeight);

}

showQuestion();

</script>

</body>
</html>
