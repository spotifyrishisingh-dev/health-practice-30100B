questions.sort(()=>Math.random()-0.5);

let current = 0;

var userAnswers = [];

for(let i=0;i<questions.length;i++){
    userAnswers.push(null);
}

 
console.log("Questions:", questions.length);
console.log("UserAnswers:", userAnswers);

function showQuestion(){

 let q = questions[current];

 document.getElementById("quiz").innerHTML = `
 <div class="question">
   <h3>${current+1}. ${q.q}</h3>

   ${q.o.map((option,index)=>`

      <label>
       <input
          type="radio"
          name="answer"
          value="${index}"
          ${userAnswers[current]===index ? "checked" : ""}
       >
       ${option}
      </label><br>

   `).join("")}

 </div>
 `;

 document.getElementById("progress").style.width =
 ((current+1)/questions.length*100) + "%";
 document.getElementById("counter").innerHTML =
"Question " +
(current+1) +
" of " +
questions.length;
}
function saveAnswer(){

 let selected =
 document.querySelector('input[name="answer"]:checked');

 if(selected){

   userAnswers[current] =
   parseInt(selected.value);

 }

}
function nextQuestion(){

 saveAnswer();

 if(current < questions.length-1){

   current++;

  -- showQuestion();

 }

}

function prevQuestion(){

 saveAnswer();

 if(current > 0){

   current--;

   -- showQuestion();

 }

}

let timeLeft=1800;

let timer=setInterval(()=>{

timeLeft--;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

document.getElementById("timer").innerHTML=
m+":"+(s<10?"0":"")+s;

if(timeLeft<=0){
clearInterval(timer);
submitExam();
}

},1000);

function submitExam(){

 saveAnswer();

 clearInterval(timer);

 let score = 0;

 let review = "";

 questions.forEach((q,index)=>{

   let studentAnswer =
   userAnswers[index];

   if(studentAnswer === q.a){

      score++;

   }
   else{

      review += `
      <div style="border:1px solid #ddd;
                  padding:10px;
                  margin:10px 0">

      <b>Question ${index+1}</b><br>

      ${q.q}<br><br>

      <b>Your Answer:</b>
      ${
        studentAnswer!=null
        ? q.o[studentAnswer]
        : "No Answer"
      }

      <br>

      <b>Correct Answer:</b>
      ${q.o[q.a]}

      <br>

      <b>Explanation:</b>
      ${q.e}

      </div>
      `;

   }

 });

 let percent =
 Math.round(
   (score/questions.length)*100
 );

 let rating="";

 if(percent>=90){

   rating =
   "🌟 Excellent - Very Ready for CBE";

 }
 else if(percent>=80){

   rating =
   "✅ Ready for CBE";

 }
 else if(percent>=70){

   rating =
   "⚠️ Review Needed";

 }
 else{

   rating =
   "📚 More Study Needed";

 }

 document.getElementById("results").innerHTML = `

 <h2>Final Score:
 ${score}/${questions.length}
 </h2>

 <h2>${percent}%</h2>

 <h3>${rating}</h3>

 <button onclick="window.print()">
 Print Results
 </button>

 <hr>

 <h2>Questions Missed</h2>

 ${review}

 `;

 window.scrollTo(0,document.body.scrollHeight);

}

showQuestion();

</script>
